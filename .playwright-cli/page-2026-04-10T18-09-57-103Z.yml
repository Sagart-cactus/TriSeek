    - generic [ref=e969]:
      - generic [ref=e970]: References & Prior Art
      - heading "Standing on Shoulders" [level=2] [ref=e971]
    - generic [ref=e972]:
      - paragraph [ref=e973]: "TriSeek's trigram indexing approach builds on decades of research in string matching and code search:"
      - generic [ref=e974]:
        - generic [ref=e975]:
          - generic [ref=e976]: "1"
          - generic [ref=e977]:
            - paragraph [ref=e978]: Ukkonen, "Approximate string-matching with q-grams and maximal matches" (1992)
            - paragraph [ref=e979]: The theoretical foundation for q-gram (n-gram) based string matching. Established that decomposing strings into overlapping q-length substrings enables efficient approximate and exact matching through set intersection. TriSeek's trigram decomposition (q=3) directly descends from this framework.
            - paragraph [ref=e980]: Theoretical Computer Science, Volume 92, Issue 1, pp. 191–211
            - paragraph [ref=e981]:
              - link "sciencedirect.com/science/article/pii/0304397592901434" [ref=e982] [cursor=pointer]:
                - /url: https://www.sciencedirect.com/science/article/pii/0304397592901434
        - generic [ref=e983]:
          - generic [ref=e984]: "2"
          - generic [ref=e985]:
            - paragraph [ref=e986]: "Manber & Wu, \"GLIMPSE: A Tool to Search Through Entire File Systems\" (1994)"
            - paragraph [ref=e987]: "The first practical system to use an inverted index over character n-grams for searching entire file systems. GLIMPSE demonstrated the core tradeoff TriSeek exploits: a small index enables dramatic pruning of the search space, making queries sub-linear in corpus size."
            - paragraph [ref=e988]: USENIX Winter Technical Conference, 1994
            - paragraph [ref=e989]:
              - link "usenix.org/.../glimpse-tool-search-through-entire-file-systems" [ref=e990] [cursor=pointer]:
                - /url: https://www.usenix.org/conference/usenix-winter-1994-technical-conference/glimpse-tool-search-through-entire-file-systems
        - generic [ref=e991]:
          - generic [ref=e992]: "3"
          - generic [ref=e993]:
            - paragraph [ref=e994]: Navarro & Baeza-Yates, "A Practical q-Gram Index for Text Retrieval Allowing Errors" (1998)
            - paragraph [ref=e995]: Extended q-gram indexing to support approximate matching and established cost models for choosing optimal q values. Their analysis of posting list intersection costs informed TriSeek's sorted-merge intersection strategy and the choice of q=3 as the selectivity sweet spot.
            - paragraph [ref=e996]: CLEI Electronic Journal, Volume 1, Number 2, 1998
            - paragraph [ref=e997]:
              - link "clei.org/cleiej/.../article/view/379" [ref=e998] [cursor=pointer]:
                - /url: https://www.clei.org/cleiej/index.php/cleiej/article/view/379
        - generic [ref=e999]:
          - generic [ref=e1000]: "4"
          - generic [ref=e1001]:
            - paragraph [ref=e1002]: Russ Cox, "Regular Expression Matching with a Trigram Index" (2012)
            - paragraph [ref=e1003]: The engineering blueprint for applying trigram indexing to code search at scale. Described how Google Code Search extracted trigram sets from regex queries, intersected posting lists to find candidate files, and verified matches with full regex evaluation. This is the direct algorithmic ancestor of TriSeek's search pipeline.
            - paragraph [ref=e1004]:
              - link "swtch.com/~rsc/regexp/regexp4.html" [ref=e1005] [cursor=pointer]:
                - /url: https://swtch.com/~rsc/regexp/regexp4.html
        - generic [ref=e1006]:
          - generic [ref=e1007]: "5"
          - generic [ref=e1008]:
            - paragraph [ref=e1009]: GitHub, "The technology behind GitHub's new code search" (2023)
            - paragraph [ref=e1010]: GitHub's engineering blog describing their Blackbird code search system, which uses n-gram indexing with content-defined chunking, delta-encoded posting lists, and a Rust-based query engine. Demonstrated that trigram-style indexing remains the state of the art for code search even at the scale of 200M+ repositories.
            - paragraph [ref=e1011]:
              - link "github.blog/2023-02-06-the-technology-behind-githubs-new-code-search" [ref=e1012] [cursor=pointer]:
