name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: triseek
          - name: macos-x86_64
            os: macos-13
            archive_ext: tar.gz
            binary_name: triseek
          - name: macos-aarch64
            os: macos-14
            archive_ext: tar.gz
            binary_name: triseek
          - name: windows-x86_64
            os: windows-latest
            archive_ext: zip
            binary_name: triseek.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin triseek

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          archive="triseek-${RELEASE_TAG}-${{ matrix.name }}.${{ matrix.archive_ext }}"
          staging="dist/triseek-${RELEASE_TAG}-${{ matrix.name }}"
          mkdir -p "$staging"
          cp "target/release/${{ matrix.binary_name }}" "$staging/triseek"
          cp README.md LICENSE "$staging/"
          tar -C dist -czf "dist/$archive" "$(basename "$staging")"
          shasum -a 256 "dist/$archive" > "dist/$archive.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $archive = "triseek-$env:RELEASE_TAG-${{ matrix.name }}.${{ matrix.archive_ext }}"
          $staging = Join-Path "dist" "triseek-$env:RELEASE_TAG-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/release/${{ matrix.binary_name }}" -Destination (Join-Path $staging "triseek.exe")
          Copy-Item "README.md","LICENSE" -Destination $staging
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath (Join-Path 'dist' $archive) -Force
          $hash = (Get-FileHash -Algorithm SHA256 (Join-Path 'dist' $archive)).Hash.ToLower()
          "$hash  $archive" | Set-Content (Join-Path 'dist' "$archive.sha256")

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
